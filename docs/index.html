<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnivTool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>UnivTool</h1>
    <p>大学生向けの講義・ファイル・予定管理デスクトップアプリ</p>
    <p>
      <a href="https://github.com/y1910663-prog/UnivTool/releases/latest">最新版をダウンロード</a>
      |
      <a href="https://github.com/y1910663-prog/UnivTool">GitHub</a>
    </p>
  </header>

  <main>
    <section>
      <h2>概要</h2>
      <p>
        UnivTool は、講義情報、保存ファイル、時間割、予定、ToDo をまとめて管理するための
        Java / JavaFX 製デスクトップアプリです。
      </p>
    </section>

    <section>
      <h2>主な機能</h2>
      <ul>
        <li>講義登録・編集・アーカイブ</li>
        <li>ファイル保存と分類</li>
        <li>ファイル検索</li>
        <li>時間割管理</li>
        <li>スケジュール / ToDo 管理</li>
      </ul>
    </section>

    <section>
      <h2>技術スタック</h2>
      <ul>
        <li>Java 17</li>
        <li>JavaFX</li>
        <li>Maven</li>
        <li>SQLite</li>
        <li>Gson</li>
        <li>Apache POI</li>
      </ul>
    </section>
  </main>
</body>
</html>
